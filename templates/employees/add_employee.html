{% extends 'base.html' %}

{% block title %}Personel Ekle{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            <h3>Yeni Personel Ekle</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Ad Soyad</label>
                    <input type="text"
                           name="fullname"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Departman</label>
                    <input type="text"
                           name="department"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Telefon</label>
                    <input type="text"
                           name="phone"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control">
                </div>

                <button class="btn btn-success">
                    Kaydet
                </button>

                <a href="/employees"
                   class="btn btn-secondary">
                   Geri Dön
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
