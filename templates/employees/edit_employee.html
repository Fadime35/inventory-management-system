{% extends 'base.html' %}

{% block title %}Personel Güncelle{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            <h3>Personel Güncelle</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Ad Soyad</label>
                    <input type="text"
                           name="fullname"
                           value="{{ employee.fullname }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Departman</label>
                    <input type="text"
                           name="department"
                           value="{{ employee.department }}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Telefon</label>
                    <input type="text"
                           name="phone"
                           value="{{ employee.phone }}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           value="{{ employee.email }}"
                           class="form-control">
                </div>

                <button type="submit"
                        class="btn btn-primary">
                    Güncelle
                </button>

                <a href="/employees"
                   class="btn btn-secondary">
                    Geri Dön
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
